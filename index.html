    <title>Metaphorist — conceptual metaphor explorer</title>
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        var dark =
          stored === "dark" ||
          (stored !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
      })();
    </script>
